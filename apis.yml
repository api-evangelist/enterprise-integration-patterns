aid: enterprise-integration-patterns
name: Enterprise Integration Patterns
description: >-
  Enterprise Integration Patterns (EIP) is a catalog of architectural design
  patterns for integrating enterprise applications. The patterns describe
  messaging-based integration scenarios and provide a common vocabulary for
  architects and developers to design and implement integration solutions. The
  canonical reference is the book by Gregor Hohpe and Bobby Woolf.
